precision: float32
device: cpu

# Set to the output/<problem>/<experiment_version> directory to test
experiment_version: __SET_AFTER_TRAIN__
output_path: ./output
processed_data_path: ./data/processed

# Disable heavy field plots for high-dimensional branch q(x) diagnostics
plot_plane: false
plot_basis: false
plot_coefficients: false
plot_coefficients_mean: false

percentiles: 3
vectors_to_highlight: 3

# Report artifacts generated by problem_dependent_visualization.py
# - metrics/baseline_performance_report.yaml
# - metrics/baseline_performance_table.csv
# - metrics/timing_comparison_report.yaml
# - plots/performance_tracking/*.png
