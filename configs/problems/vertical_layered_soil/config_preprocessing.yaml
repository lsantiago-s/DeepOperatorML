# ---------------------- Location of raw data ----------------
raw_data_path: ./data/raw/vertical_layered_soil/vertical_layered_soil_paper_baseline_v4_profile_operator.npz

# ------------------------- Dataset parameters ----------------
problem: vertical_layered_soil
splitting:
  ratios: [0.8, 0.1, 0.1]
  seed: 42

data_labels:
  features: [xb, xt]
  targets: [g_u]

# Profile contract: dim = 7 * Nz + 1, where Nz is profile_encoding.num_points in datagen config.
input_function_keys:
  - xb

input_function_labels:
  - '$\text{profile}(z)$'
  - '$a_0$'

coordinate_keys:
  - r
  - s1
  - s2

# Target is complex 4-channel operator output per geometry query:
# [Uxx, Uxz, Uzx, Uzz] on xt=(r,s1,s2).
output_keys:
  - re_uxx
  - re_uxz
  - re_uzx
  - re_uzz
  - im_uxx
  - im_uxz
  - im_uzx
  - im_uzz

output_labels:
  - '$\Re(U_{xx})$'
  - '$\Re(U_{xz})$'
  - '$\Re(U_{zx})$'
  - '$\Re(U_{zz})$'
  - '$\Im(U_{xx})$'
  - '$\Im(U_{xz})$'
  - '$\Im(U_{zx})$'
  - '$\Im(U_{zz})$'

var_share: 0.95
