data_filename: ./data/raw/vertical_layered_soil/vertical_layered_soil_paper_damping_v4_profile_operator.npz
executable_path: auto

seed: 42
num_samples: 120

N: 2
Nload: 1
B: 0.0
M: 20
receiver_interface: 1

codes: [1, 1, 1, 1]
outputfilename: dontmatter

a_ref: 1.0
a0:
  min: 0.05
  max: 4.0

profile_encoding:
  z_max: 2.0
  num_points: 64

block_channel_map:
  uxx: urfx
  uzx: uzfx
  uxz: urmy
  uzz: uzmy

sampling:
  # Damping-focused variant on vertical layered baseline.
  mode: paper_case
  max_tries_per_layer: 1000

  paper_cases: [C]
  paper_case_probabilities: [1.0]

  # Keep c_ij and h fixed; vary damping coherently across layers.
  paper_c_jitter_rel: 0.0
  paper_eta_jitter_abs: 0.095
  paper_shared_eta_jitter: true
  paper_rho_jitter_abs: 0.0
  paper_h_jitter_abs: 0.0

max_attempts_per_sample: 20
solver_timeout_seconds: 300
