precision: float32
device: cpu

# Location of dataset to test
experiment_version: null
# Location of outputs (data, metrics) - Set this if testing a pretrained model
output_path: ./output
processed_data_path: ./data/processed

plot_plane: false
plot_basis: false
plot_coefficients: false
plot_coefficients_mean: false

# Plot every X percentile (e.g every 10th percentile of the input functions)
percentiles: 3
vectors_to_highlight: 3

# Multilayer full-matrix plotting options
plot_paper_alignment: true
plot_paper_profiles: true
plot_prediction_heatmaps: true
frequency_axis_label: a0
plot_max_samples: 3

# Required benchmark contract outputs generated by problem_dependent_visualization:
# - metrics/baseline_performance_report.yaml
# - metrics/baseline_performance_table.csv
# - metrics/timing_comparison_report.yaml
# - plots/performance_tracking/*.png
