# ---------------------- Location of raw .npz data file ----------------
raw_data_path: ./data/raw/rajapakse_homogeneous/rajapakse_homogeneous_v1.npz

# ------------------------- Dataset parameters ----------------
problem: rajapakse_homogeneous
splitting:
  ratios: [0.8, 0.1, 0.1]
  seed: 42

data_labels:
  features: [xb, xt]
  targets: [g_u]

input_function_keys:
  - c11_over_c44
  - c12_over_c44
  - c13_over_c44
  - c33_over_c44
  - rho_over_rho0
  - delta

input_function_labels:
  - "$c_{11}/c_{44}$"
  - "$c_{12}/c_{44}$"
  - "$c_{13}/c_{44}$"
  - "$c_{33}/c_{44}$"
  - "$\\rho/\\rho_0$"
  - "$\\delta$"

coordinate_keys:
  - r
  - z

output_keys:
  - g_u_real
  - g_u_imag

output_labels:
  - "$\\Re(\\mathbf{u})$"
  - "$\\Im(\\mathbf{u})$"

var_share: 0.999
