# Paper-aligned homogeneous half-space data generation (Rajapakse & Wang formulation)
data_filename: ./data/raw/rajapakse_homogeneous/rajapakse_homogeneous_v1.npz
seed: 42

# Dataset size
N: 500

# Cylindrical field grid (physical units, internally normalized by r_source)
N_r: 40
N_z: 40
r_min: 0.0
r_max: 10.0
z_min: 0.0
z_max: 10.0

# Source geometry
z_source: 0.0
l_source: 0.0
r_source: 2.0

# Solver setup
component: 1
loadtype: 3
bvptype: 2
damp: 0.01

# Sampling mode:
# - transversely_isotropic (paper-aligned, nondimensional c_ij/c44 + delta)
# - isotropic_from_E_nu (legacy mode, samples E, nu, rho, omega then maps to nondimensional form)
sampling_mode: transversely_isotropic
max_tries_per_sample: 3000

# Nondimensional transversely isotropic ranges (paper-oriented formulation)
# Stability is enforced during sampling.
c11_over_c44: [2.5, 5.5]
c12_over_c44: [0.4, 2.6]
c13_over_c44: [0.4, 2.6]
c33_over_c44: [2.5, 6.8]
rho_over_rho0: [0.8, 1.4]
delta_min: 0.0
delta_max: 4.0

# Legacy isotropic ranges (used only when sampling_mode = isotropic_from_E_nu)
E_min: 1.0e7
E_max: 2.0e11
nu_min: 0.20
nu_max: 0.40
rho_min: 1.0e3
rho_max: 8.0e3
omega_min: 0.0
omega_max: 5200.0
