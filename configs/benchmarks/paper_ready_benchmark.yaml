name: paper_ready_benchmark
description: >
  Reproducible benchmark manifest for paper-ready DeepONet experiments across
  kelvin, rajapakse_fixed_material, ground_vibration and vertical_layered_soil.

train_configs:
  don: ./configs/training/config_don_train.yaml
  fno: ./configs/training/config_fno_train.yaml

required_contract:
  metrics_files:
    - baseline_performance_report.yaml
    - baseline_performance_table.csv
    - timing_comparison_report.yaml
  plot_globs:
    - plots/performance_tracking/*.png

defaults:
  stability_seeds: [42, 43, 44]
  reproducibility_tolerance: 1.0e-4

expansion_tracks:
  fno:
    status: scaffold_only
    notes: "Set model_track=fno once src/modules/pipe/fno_train.py is implemented."
  kelvin_operator:
    problem: kelvin
    datagen_config: ./configs/problems/kelvin/datagen_operator.yaml
    preprocessing_config: ./configs/problems/kelvin/config_preprocessing_operator.yaml
    experiment_config: ./configs/problems/kelvin/config_experiment_operator.yaml
    test_config: ./configs/problems/kelvin/config_test_operator.yaml
    notes: "Operator mapping q(x) -> u(x,y,z) with fixed material scalars."
  coaraci_gpu:
    templates_dir: ./scripts/hpc/coaraci
    notes: "Slurm templates for train/test runs on GPU nodes."

problems:
  kelvin:
    enabled: true
    datagen_config: ./configs/problems/kelvin/datagen.yaml
    preprocessing_config: ./configs/problems/kelvin/config_preprocessing.yaml
    experiment_config: ./configs/problems/kelvin/config_experiment.yaml
    test_config: ./configs/problems/kelvin/config_test.yaml
    canonical_dataset_version: f83e9497
    canonical_experiments:
      don: null
      fno: null

  rajapakse_fixed_material:
    enabled: true
    datagen_config: ./configs/problems/rajapakse_fixed_material/datagen_paper_baseline.yaml
    preprocessing_config: ./configs/problems/rajapakse_fixed_material/config_preprocessing.yaml
    experiment_config: ./configs/problems/rajapakse_fixed_material/config_experiment.yaml
    test_config: ./configs/problems/rajapakse_fixed_material/config_test.yaml
    canonical_dataset_version: a37f8126
    canonical_experiments:
      don: null
      fno: null

  ground_vibration:
    enabled: true
    skip_if_missing_datagen_inputs: true
    external_datagen_command:
      - python3
      - scripts/ground_vibration/generate_external_dataset.py
      - --out-dir
      - ./data/raw/ground_vibration/influence_dataset_N100_samples100_csv
      - --n-samples
      - "100"
      - --n-points
      - "100"
      - --half-span
      - "2.0"
      - --a0-min
      - "0.05"
      - --a0-max
      - "4.0"
      - --eta-min
      - "0.005"
      - --eta-max
      - "0.05"
    datagen_config: ./configs/problems/ground_vibration/datagen.yaml
    preprocessing_config: ./configs/problems/ground_vibration/config_preprocessing.yaml
    experiment_config: ./configs/problems/ground_vibration/config_experiment.yaml
    test_config: ./configs/problems/ground_vibration/config_test.yaml
    canonical_dataset_version: 3636a9cc
    canonical_experiments:
      don: 2025-11-10_14-23-36
      fno: null

  vertical_layered_soil:
    enabled: true
    datagen_config: ./configs/problems/vertical_layered_soil/datagen_paper_baseline.yaml
    preprocessing_config: ./configs/problems/vertical_layered_soil/config_preprocessing.yaml
    experiment_config: ./configs/problems/vertical_layered_soil/config_experiment.yaml
    test_config: ./configs/problems/vertical_layered_soil/config_test.yaml
    canonical_dataset_version: ""
    canonical_experiments:
      don: null
      fno: null
